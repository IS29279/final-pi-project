<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PITA — Report</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.1rem; color: #58a6ff; letter-spacing: 0.1em; }
    nav a { color: #8b949e; font-size: 0.8rem; text-decoration: none; }
    nav a:hover { color: #c9d1d9; }
    main { max-width: 820px; margin: 2rem auto; padding: 0 1.5rem; }
    pre { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 1.5rem; white-space: pre-wrap; word-break: break-word; font-size: 0.82rem; line-height: 1.7; color: #c9d1d9; }
    .meta { font-size: 0.78rem; color: #8b949e; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <header>
    <h1>PI INTRUSION TESTING APPLIANCE</h1>
    <nav><a href="/scan/{{ report.scan_id }}">&larr; Scan #{{ report.scan_id }}</a></nav>
  </header>
  <main>
    <p class="meta">Generated {{ report.generated_at.strftime('%Y-%m-%d %H:%M:%S') if report.generated_at else '' }}</p>
    <pre>{{ report.content }}</pre>
  </main>
</body>
</html>
