<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Network Lock Security — Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Share Tech Mono', monospace; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    header {
      position: relative;
      z-index: 10;
      background: rgba(22,27,34,0.97);
      border-bottom: 1px solid #30363d;
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .header-left img { height: 38px; filter: drop-shadow(0 0 8px rgba(88,166,255,0.4)); }
    .header-title { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; font-weight: 700; color: #e6edf3; letter-spacing: 0.05em; }
    .header-title span { color: #58a6ff; }
    .header-nav { display: flex; align-items: center; gap: 0.25rem; margin-left: 2rem; }
    .nav-link { font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #8b949e; text-decoration: none; padding: 0.35rem 0.85rem; border-radius: 4px; transition: color 0.2s, background 0.2s; }
    .nav-link:hover { color: #e6edf3; background: #1c2128; }
    .team-tag { font-size: 0.68rem; color: #484f58; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid #21262d; padding: 0.2rem 0.6rem; border-radius: 3px; }
    main { position: relative; z-index: 1; max-width: 860px; margin: 2.5rem auto; padding: 0 1.5rem 4rem; }
    .report-meta {
      background: rgba(22,27,34,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid #30363d;
      border-top: 2px solid #58a6ff;
      border-radius: 0 0 6px 6px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.25rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .meta-item label { display: block; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: #484f58; margin-bottom: 0.2rem; }
    .meta-item span  { font-size: 0.82rem; color: #e6edf3; }
    .meta-item span.blue { color: #58a6ff; }
    pre {
      background: rgba(22,27,34,0.55);
      backdrop-filter: blur(10px);
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 1.75rem;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.82rem;
      line-height: 1.8;
      color: #c9d1d9;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <img src="/static/logo.png" alt="Network Lock Security">
      <span class="header-title">Network <span>Lock</span> Security</span>
      <nav class="header-nav">
        <a href="/"        class="nav-link">Dashboard</a>
        <a href="/history" class="nav-link">Scan History</a>
        <a href="/reports" class="nav-link active" style="color:#58a6ff; background:rgba(88,166,255,0.08);">Reports</a>
      </nav>
    </div>
    <div style="display:flex; align-items:center; gap:1rem;">
      <a href="/scan/{{ report['session_id'] }}" class="nav-link">&#8592; Scan Detail</a>
      <span class="team-tag">Team 3 &mdash; ITP 258</span>
    </div>
  </header>

  <main>
    <div class="report-meta">
      <div class="meta-item">
        <label>Session ID</label>
        <span>{{ report['session_id'][:8] }}...</span>
      </div>
      <div class="meta-item">
        <label>Generated</label>
        <span>{{ report['generated_at'] | to_est }}</span>
      </div>
      <div class="meta-item">
        <label>Format</label>
        <span class="blue">{{ report['format'] }}</span>
      </div>
    </div>
    <pre>{{ content }}</pre>
  </main>
</body>
</html>
